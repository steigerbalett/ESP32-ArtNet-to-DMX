name: Build & Release (ESP32)

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32:esp32:esp32
            artifact: ESP32-ArtNet-to-DMX_ESP32.bin
            label: ESP32 (generic)

          - board: esp32:esp32:esp32s3
            artifact: ESP32-ArtNet-to-DMX_ESP32-S3.bin
            label: ESP32-S3

          - board: esp32:esp32:esp32c3
            artifact: ESP32-ArtNet-to-DMX_ESP32-C3.bin
            label: ESP32-C3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install required libraries
        run: |
          arduino-cli lib install "ArtnetWifi"
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install --git-url \
            https://github.com/someweisguy/esp_dmx.git

      - name: Build firmware [${{ matrix.label }}]
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.board }}" \
            --output-dir build_output \
            ESP32-ArtNet-to-DMX/ESP32-ArtNet-to-DMX.ino

      - name: Rename binary
        run: |
          BIN=$(find build_output -name "*.bin" | grep -v bootloader | grep -v partitions | head -n1)
          if [ -z "$BIN" ]; then
            echo "ERROR: No firmware binary found in build_output!"
            find build_output -type f
            exit 1
          fi
          cp "$BIN" "${{ matrix.artifact }}"
          echo "Binary size: $(du -h ${{ matrix.artifact }})"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  draft-release:
    name: Create Draft Release (on every commit)
    needs: build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate short changelog
        id: changelog
        run: |
          LOG=$(git log -10 --pretty=format:"- %s (%h)")
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create / update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: draft-latest
          name: "ESP32-ArtNet-to-DMX – Draft (latest commit)"
          body: |
            ## ESP32-ArtNet-to-DMX – Draft Build

            > **This is an automated draft release** built from the latest commit on branch `${{ github.ref_name }}` (`${{ github.sha }}`).
            > It will be replaced on every subsequent commit. Do **not** use this for production.

            Receives 2 ArtNet universes via WiFi and outputs them as 2 physical DMX universes, with RDM (E1.20) support.

            ### Binaries (ESP32)
            | File | Board |
            |---|---|
            | `ESP32-ArtNet-to-DMX_ESP32.bin` | ESP32 (generic / DevKit) |
            | `ESP32-ArtNet-to-DMX_ESP32-S3.bin` | ESP32-S3 |
            | `ESP32-ArtNet-to-DMX_ESP32-C3.bin` | ESP32-C3 |

            ### Flash via Web GUI
            https://esptool.spacehuhn.com

            * Open the page in Chrome or Edge
            * Connect the ESP32 via USB
            * Click Connect and select the COM port
            * Upload the .bin file, then click Program

            ### Flash via esptool CLI
            ```bash
            esptool.py --chip esp32 --baud 921600 \
              write_flash 0x10000 ESP32-ArtNet-to-DMX_ESP32.bin
            ```

            > **Note:** Adjust the SSID/password in the sketch before flashing, or set `WIFI_MODE_CAPTIVE`. Also make sure the DMX pins match your hardware.

            ### Recent Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: release-assets/*.bin
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -v "^${{ github.ref_name }}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" | head -30)
          else
            LOG=$(git log ${PREV_TAG}..${{ github.ref_name }} \
              --pretty=format:"- %s (%h)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ESP32-ArtNet-to-DMX ${{ github.ref_name }}"
          body: |
            ## ESP32-ArtNet-to-DMX ${{ github.ref_name }}

            Receives 2 ArtNet universes via WiFi and outputs them as 2 physical DMX universes, with RDM (E1.20) support.

            ### Binaries (ESP32)
            | File | Board |
            |---|---|
            | `ESP32-ArtNet-to-DMX_ESP32.bin` | ESP32 (generic / DevKit) |
            | `ESP32-ArtNet-to-DMX_ESP32-S3.bin` | ESP32-S3 |
            | `ESP32-ArtNet-to-DMX_ESP32-C3.bin` | ESP32-C3 |

            ### Flash via Web GUI
            https://esptool.spacehuhn.com

            * Open the page in Chrome or Edge
            * Connect the ESP32 via USB
            * Click Connect and select the COM port
            * Upload the .bin file, then click Program

            ### Flash via esptool CLI
            ```bash
            esptool.py --chip esp32 --baud 921600 \
              write_flash 0x10000 ESP32-ArtNet-to-DMX_ESP32.bin
            ```

            > **Note:** Adjust the SSID/password in the sketch before flashing, or set `WIFI_MODE_CAPTIVE`. Also make sure the DMX pins match your hardware.

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: release-assets/*.bin
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
